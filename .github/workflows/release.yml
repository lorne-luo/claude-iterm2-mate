name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build .app
        run: scripts/make-app.sh "${{ steps.ver.outputs.version }}"
      - name: Package .dmg
        run: scripts/make-dmg.sh "${{ steps.ver.outputs.version }}"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/ClaudeItermMate-*.dmg
